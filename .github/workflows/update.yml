name: Update Dependencies
on:
  schedule:
    # 4x daily, outside Europe/Berlin work hours, tracking US West Coast release window.
    # 18:00/21:00 UTC catch US morning/early-afternoon drops (evening in Berlin).
    # 00:00/04:00 UTC sweep US end-of-day; results ready before Berlin morning.
    - cron: '0 0,4,18,21 * * *'
  workflow_dispatch:
    inputs:
      packages:
        description: 'Specific packages to update (space-separated, empty for all)'
        required: false
        default: ''
      inputs:
        description: 'Specific flake inputs to update (space-separated, empty for all)'
        required: false
        default: ''
jobs:
  update:
    uses: ./.github/workflows/update-flake.yml
    with:
      packages: ${{ github.event.inputs.packages }}
      inputs: ${{ github.event.inputs.inputs }}
      pr-labels: 'dependencies,automated'
      auto-merge: true
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
    permissions:
      contents: write
      pull-requests: write
